name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Archive
        run: >
          xcodebuild archive
          -scheme Repo2Prompt
          -destination 'platform=macOS'
          -configuration Release
          -archivePath ${{ runner.temp }}/Repo2Prompt.xcarchive
          CODE_SIGN_IDENTITY="-"
          CODE_SIGNING_REQUIRED=NO

      - name: Package app
        run: |
          cd "${{ runner.temp }}/Repo2Prompt.xcarchive/Products/Applications"
          zip -r "${{ runner.temp }}/Repo2Prompt.zip" Repo2Prompt.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" "${{ runner.temp }}/Repo2Prompt.zip" \
            --title "Repo2Prompt $TAG" \
            --generate-notes
