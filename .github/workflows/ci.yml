name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: >
          xcodebuild build-for-testing
          -scheme Repo2Prompt
          -destination 'platform=macOS'
          -configuration Debug
          CODE_SIGN_IDENTITY="-"
          CODE_SIGNING_REQUIRED=NO
          | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test
        run: >
          xcodebuild test-without-building
          -scheme Repo2Prompt
          -destination 'platform=macOS'
          -configuration Debug
          CODE_SIGN_IDENTITY="-"
          CODE_SIGNING_REQUIRED=NO
          | xcpretty && exit ${PIPESTATUS[0]}
