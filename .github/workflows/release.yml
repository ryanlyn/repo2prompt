name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$MACOS_CERTIFICATE_P12" | openssl base64 -d -A -out "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write notarization API key
        env:
          APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
        run: |
          APPSTORE_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

          echo "$APPSTORE_CONNECT_PRIVATE_KEY" | openssl base64 -d -A -out "$APPSTORE_KEY_PATH"
          chmod 600 "$APPSTORE_KEY_PATH"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          ARCHIVE_PATH="$RUNNER_TEMP/Repo2Prompt.xcarchive"

          xcodebuild archive \
            -scheme Repo2Prompt \
            -destination 'platform=macOS' \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Prepare app bundle
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/Repo2Prompt.xcarchive"
          EXPORT_APP_PATH="$RUNNER_TEMP/Repo2Prompt.app"
          NOTARIZATION_ZIP="$RUNNER_TEMP/Repo2Prompt-notarization.zip"

          ditto "$ARCHIVE_PATH/Products/Applications/Repo2Prompt.app" "$EXPORT_APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$EXPORT_APP_PATH"
          ditto -c -k --keepParent "$EXPORT_APP_PATH" "$NOTARIZATION_ZIP"

      - name: Notarize app
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          APPSTORE_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          NOTARIZATION_ZIP="$RUNNER_TEMP/Repo2Prompt-notarization.zip"

          xcrun notarytool submit "$NOTARIZATION_ZIP" \
            --key "$APPSTORE_KEY_PATH" \
            --key-id "$APPSTORE_CONNECT_KEY_ID" \
            --issuer "$APPSTORE_CONNECT_ISSUER_ID" \
            --wait

      - name: Staple and package release zip
        run: |
          EXPORT_APP_PATH="$RUNNER_TEMP/Repo2Prompt.app"
          RELEASE_ZIP="$RUNNER_TEMP/Repo2Prompt.zip"
          STAPLED=0

          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "$EXPORT_APP_PATH"; then
              STAPLED=1
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Stapling failed after $attempt attempts, falling back to Gatekeeper assessment" >&2
              break
            fi

            sleep 15
          done

          if [ "$STAPLED" -eq 1 ]; then
            xcrun stapler validate "$EXPORT_APP_PATH"
          else
            spctl --assess --type execute --verbose=4 "$EXPORT_APP_PATH"
          fi

          ditto -c -k --keepParent "$EXPORT_APP_PATH" "$RELEASE_ZIP"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_ZIP="$RUNNER_TEMP/Repo2Prompt.zip"
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" "$RELEASE_ZIP" \
            --title "Repo2Prompt $TAG" \
            --generate-notes
